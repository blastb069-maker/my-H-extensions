name: CI
on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
env:
  CI_CHUNK_SIZE: 288
jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrices.outputs.individualMatrix }}
    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get number of modules
        run: |
          set -x
          projects=(src/*/*)
          echo "NUM_INDIVIDUAL_MODULES=${#projects[@]}" >> "$GITHUB_ENV"

      - name: Find lib changes
        id: modified-libs
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c
        with:
          files: lib/
          files_ignore: lib/**.md
          files_separator: " "
          safe_output: false

      - name: Bump extensions that uses a modified lib
        if: steps.modified-libs.outputs.any_changed == 'true'
        run: |
          chmod +x ./.github/scripts/bump-versions.py
          ./.github/scripts/bump-versions.py ${{ steps.modified-libs.outputs.all_changed_files }}

      - id: generate-matrices
        name: Create output matrices
        uses: actions/github-script@v7
        with:
          script: |
            const numIndividualModules = process.env.NUM_INDIVIDUAL_MODULES;
            const chunkSize = process.env.CI_CHUNK_SIZE;
            const numIndividualChunks = 1;
            console.log(`Individual modules: ${numIndividualModules} (${numIndividualChunks} chunks of ${chunkSize})`);
            core.setOutput('individualMatrix', JSON.stringify({ 'chunk': [...Array(numIndividualChunks).keys()] }));

  build_individual:
    name: Build individual modules
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Skip signing
        run: echo "Skipping signing"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prune incomplete extensions
        run: chmod +x ./.github/scripts/prune-incomplete-extensions.sh && ./.github/scripts/prune-incomplete-extensions.sh

      - name: Remove stale it.hanime build outputs
        run: |
          rm -rf src/it/hanime
          find src -type f -name 'aniyomi-it.hanime*.apk' -delete

      - name: Restore build cache
        uses: actions/cache/restore@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-v2-${{ github.sha }}-${{ matrix.chunk }}
          restore-keys: |
            build-cache-v2-${{ github.sha }}-

      - name: Purge cached it.hanime intermediates
        run: rm -rf src/it/hanime

      - name: Build extensions
        env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: chmod +x ./gradlew && ./gradlew -p src assembleDebug

      - name: Store build cache
        uses: actions/cache/save@v3
        with:
          path: |
            src/**/build
            !src/**/build/outputs
          key: build-cache-v2-${{ github.sha }}-${{ matrix.chunk }}

      - name: Drop stale APKs before upload
        run: find . -type f -name 'aniyomi-it.hanime*.apk' -delete

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: "individual-apks-${{ matrix.chunk }}"
          path: "src/**/build/outputs/apk/**/*.apk"
          retention-days: 1

  publish:
    name: Publish repo
    needs: build_individual
    runs-on: ubuntu-latest
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Create repo artifacts
        run: |
          chmod +x ./.github/scripts/prune-incomplete-extensions.sh
          ./.github/scripts/prune-incomplete-extensions.sh
          find ~/apk-artifacts -type f -name 'aniyomi-it.hanime*.apk' -delete
          python3 ./.github/scripts/move-apks.py
          find repo/apk -type f -name 'aniyomi-it.hanime*.apk' -delete
          echo "APK count: $(find repo/apk -maxdepth 1 -name '*.apk' | wc -l)"
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/aniyomiorg/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python3 ./.github/scripts/create-repo.py

      - name: Deploy to repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.CI_COMMIT_TOKEN }}
          publish_dir: ./repo
          publish_branch: repo
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "ci: auto-build ${{ github.sha }}"
